<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#c8f500" />
    <title>Catalyx Labs</title>
    <style>
      :root {
        color-scheme: dark;
        background: #050707;
        color: #f7fee7;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        align-items: center;
        background:
          radial-gradient(circle at 50% 0%, rgba(200, 245, 0, 0.16), transparent 32rem),
          linear-gradient(180deg, #0a0d0d 0%, #050707 100%);
        display: flex;
        min-height: 100vh;
        margin: 0;
        padding: 24px;
      }

      main {
        margin: auto;
        max-width: 420px;
      }

      .mark {
        border: 1px solid rgba(200, 245, 0, 0.3);
        color: #c8f500;
        display: inline-flex;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.18em;
        margin-bottom: 22px;
        padding: 10px 12px;
        text-transform: uppercase;
      }

      h1 {
        font-size: clamp(34px, 9vw, 56px);
        letter-spacing: 0;
        line-height: 0.92;
        margin: 0 0 16px;
        text-transform: uppercase;
      }

      p {
        color: #a1a1aa;
        font-size: 16px;
        line-height: 1.7;
        margin: 0;
      }

      .status {
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        color: #d4d4d8;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.12em;
        margin-top: 28px;
        padding-top: 18px;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">Catalyx Labs</div>
      <h1>Precision Cultivation Made Simple</h1>
      <p>
        The mobile shell is ready. Set CAPACITOR_SERVER_URL to your deployed Catalyx Labs web app
        before syncing iOS or Android.
      </p>
      <div class="status">Native wrapper standby</div>
    </main>
  </body>
</html>
